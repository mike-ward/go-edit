version: "2"

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - gocyclo
    - modernize
    - unused
    - revive
    - perfsprint
    - gocritic
  settings:
    gocyclo:
      min-complexity: 30
    gocritic:
      disabled-checks:
        # Compound conditions are more readable as if-else chains
        # than a top-level switch. Disabled to avoid churn on
        # existing wrap/fold dispatch patterns.
        - ifElseChain
    revive:
      rules:
        - name: exported
        - name: if-return
        - name: error-strings
        - name: unexported-return
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocyclo
      - path: _test\.go
        text: SA5011
